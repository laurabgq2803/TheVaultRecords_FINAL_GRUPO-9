<!doctype html>
<html lang="es">
<head>
  <!-- Configuración general de la página y carga de estilos del carrito -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" >
  <title>Carrito | The Vault Records</title>
    <link rel="icon" href="imagenes/icon2.png" type="image/png" sizes="45x45">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/carrito.css">
</head>
<body>
  <div class="pagina">
    <!-- Barra superior con acceso de regreso -->
    <header class="barra-superior">
      <a class="boton-enlace" href="Productos_Artistas.html">ATR&Aacute;S</a>
    </header>

    <!-- Contenedor principal del carrito con listado, total y acción de pago -->
    <main class="principal-carrito">
      <form class="formulario-carrito" action="pago.html" method="get" id="cartForm">
        <!-- Área donde JavaScript inserta dinámicamente los productos agregados -->
        <section class="lista-carrito" aria-label="Productos del carrito" id="cartItems"></section>

        <!-- Resumen del monto acumulado del carrito -->
        <section class="panel-total" aria-label="Total del carrito">
          <p class="etiqueta-total">Total del carrito:</p>
          <p class="valor-total" id="cartTotal">$0.00</p>
        </section>
        <input type="hidden" id="payTotalInput" name="payTotal" value="$0.00">

        <!-- Botón que envía al flujo de pago manteniendo el total actual -->
        <div class="contenedor-pago">
          <button class="boton-principal" id="checkoutButton" type="submit">Proseguir al pago</button>
        </div>
      </form>
    </main>
  </div>

  <!-- Lógica compartida del carrito y script específico de esta vista -->
  <script src="jscript/script.js"></script>
  <script src="jscript/carrito.js"></script>
</body>
</html>
